<!DOCTYPE html>
<html lang="en"> 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOA Property</title>
    <link rel="stylesheet" href="property.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
     <aside class="sidebar">
        <div class="sidebar-logo">
            <img src="HOA LOGO 2.png" alt="HOA Logo">
            <div class="sidebar-logo-text">
                <span class="logo-title">Marcelo Green Village</span>
                <span class="logo-sub">Phase 5</span>
            </div>
        </div>

        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item">
                <i class="fa-solid fa-gauge-high"></i>
                <span>Dashboard</span>
            </a>
            <a href="residents.html" class="nav-item">
                <i class="fa-solid fa-people-roof"></i>
                <span>Residents</span>
            </a>
            <a href="property.html" class="nav-item active">
                <i class="fa-solid fa-house"></i>
                <span>Properties</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fa-solid fa-id-badge"></i>
                <span>Employees</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fa-solid fa-car"></i>
                <span>Vehicles</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <a href="login.html" class="nav-item logout">
                <i class="fa-solid fa-right-from-bracket"></i>
                <span>Log Out</span>
            </a>
        </div>
    </aside>

    <div class="main-wrapper">
        <header class="topbar">
            <div class="topbar-left">
                <h1 class="page-title">Properties</h1>
                <p class="page-subtitle">View, edit, and manage properties.</p>
            </div>
            <div class="topbar-right">
                <div class="topbar-user">
                    <div class="user-avatar">
                        <i class="fa-solid fa-user"></i>
                    </div>
                    <div class="user-info">
                        <span class="user-name">Village Admin</span>
                        <span class="user-role">Administrator</span>
                    </div>
                </div>
            </div>
        </header>
    
        <main class="content">
            <div class="action-buttons">
                <button class="btn btn-primary"><i class="fa-solid fa-plus"></i> Add Property
                </button>
                <button class="btn btn-secondary"><i class="fa-solid fa-upload"></i>Import CSV</button>
                <button class="btn btn-secondary"><i class="fa-solid fa-download"></i>Export CSV</button> 
            </div>

            <div class="search-bar">
                <input type="text" class="search-input" placeholder="Search by address, owner, or lot..." id="searchInput">
            </div>

                <div class="property-table table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th class="checkbox-col"><input type="checkbox" id="selectAll"></th>
                                <th>Property Address</th>
                                <th>Lot/Unit</th>
                                <th>Owner</th>
                                <th>Residents</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </main> 
    </div>
</body>
</html>
