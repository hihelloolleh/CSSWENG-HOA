<!DOCTYPE html>
<html lang="en"> 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOA Property</title>
    <link rel="stylesheet" href="property.css">
    
    <!-- crud imports-->
    <script></script> 
</head>
<body>
    <div class="property-container">
        <div class="property-header">
            <h1>Property Management</h1>
            <p>Manage properties, owners, and residents in the community.</p>
        </div>
        <div class="property-options">
            <button>Add Property</button>
            <button>Import Excel (CSV)</button>
            <button>Export Excel (CSV)</button>
            <input type="search"><button>Search</button>
            <button>Filters</button>
        </div>
        <div class="property-table">
            <table>
                <tr>
                    <th><input type="checkbox"></th>
                    <th>Property Address</th>
                    <th>Lot/Unit</th>
                    <th>Owner</th>
                    <th>Residents</th>
                    <th>Status</th>
                </tr>
                <tr>
                    <td><input type="checkbox"></td>
                </tr>
                <tr>
                    <td><input type="checkbox"></td>
                </tr>
                <tr>
                    <td><input type="checkbox"></td>
                </tr>
                <tr>
                    <td><input type="checkbox"></td>
                </tr>
                <tr>
                    <td><input type="checkbox"></td>
                </tr>
            </table>
        </div>
        <div class="properties-page">
            <h3>Showing page 1 out of ... properties</h3>
            <button>&lt;&lt;</button>
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button>&gt;&gt;</button>
        </div>
    </div> 
    
</body>
</html>
