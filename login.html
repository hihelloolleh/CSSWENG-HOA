<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOA Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="login-container">

        <!-- Left Panel -->
        <div class="left-panel">
            <!-- HOA logo or image here -->
        </div>

        <!-- Right Panel -->
        <div class="right-panel">

            <h1>Welcome!</h1>
            <p>Please sign in to your HOA account</p>

            <form>

                <div class="email">
                    <label>Email</label>
                    <input type="text" placeholder="Enter your email">
                </div>

                <div class="password">
                    <label>Password</label>
                    <input type="password" placeholder="Enter your password">
                </div>

                <div class="options">
                    <label>
                        <input type="checkbox">
                        Remember Me
                    </label>

                    <a href="#">Forgot Password?</a>
                </div>

                <button type="submit">
                    Sign In
                </button>

                <div class="login-help">
                    Having troubles logging in? 
                    <a href="#"><u>Contact the HOA Admin here.</u></a>
                </div>
            </form>

        </div>

    </div>

</body>
</html>
